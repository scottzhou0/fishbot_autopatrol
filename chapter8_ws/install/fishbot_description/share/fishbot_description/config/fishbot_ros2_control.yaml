---
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz
    use_sim_time: true

    # 加载的控制器列表
    fishbot_joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # 加载力控制器l配置
    fishbot_effort_controller:
      type: effort_controllers/JointGroupEffortController

    velocity_controller:
      type: diff_drive_controller/DiffDriveController

fishbot_effort_controller:
  ros__parameters:
    joints:
      - left_wheel_joint
      - right_wheel_joint
    command_interfaces:
      - effort
    state_interfaces:
      - position
      - velocity
      - effort
    # 差速驱动控制器配置
velocity_controller:
  ros__parameters:
    left_wheel_names: ['left_wheel_joint']
    right_wheel_names: ['right_wheel_joint']
    wheel_separation: 0.20  # 车轮间距（根据你的机器人实际尺寸调整）
    wheel_radius: 0.033     # 车轮半径（根据你的机器人实际尺寸调整）

    wheel_separation_mutiplier: 1.0
    left_wheel_multiplier: 1.0
    right_wheel_multiplier: 1.0


    publish_rate: 50.0  # Hz
    odom_frame_id: odom
    base_frame_id: base_footprint
    pose_covariance_diagonal: [0.001, 0.001, 1000000.0, 1000000.0, 1000000.0, 1000.0]
    twist_covariance_diagonal: [0.001, 0.001, 0.001, 0.001, 0.001, 0.001]

    open_loop_control: true
    enable_odom_tf: true
    use_stamped_vel: false
    cmd_vel_timeout: 0.5  # 命令超时时间（秒）

    # 控制参数 - 修复参数结构（兼容diff_drive_controller的最新格式）

    
    # linear/x/max_velocity: 0.5     # m/s
    # linear/x/min_velocity: -0.5
    # angular/z/max_velocity: 1.0    # rad/s
    # angular/z/min_velocity: -1.0
    # 必要的里程计配置（避免运行时警告）

